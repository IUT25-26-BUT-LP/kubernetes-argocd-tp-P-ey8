apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-securisee-argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/IUT25-26-BUT-LP/kubernetes-argocd-tp-P-ey8.git'
    targetRevision: HEAD
    path: app-securisee/k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true